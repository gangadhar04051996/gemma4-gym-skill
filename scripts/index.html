<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const jsonData = JSON.parse(data);
                const action = jsonData.action;

                if (action === 'log_workout') {
                    return JSON.stringify({ result: logWorkout(jsonData) });
                }

                if (action === 'get_history') {
                    return JSON.stringify({ result: getHistory(jsonData) });
                }

                return JSON.stringify({ error: 'Unknown action: ' + action });

            } catch (e) {
                return JSON.stringify({ error: 'Error: ' + e.message });
            }
        };

        function todayISO() {
            const d = new Date();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${mm}-${dd}`;
        }

        function loadLog() {
            try {
                const raw = localStorage.getItem('gym_log');
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveLog(entries) {
            localStorage.setItem('gym_log', JSON.stringify(entries));
        }

        function logWorkout(params) {
            const entries = loadLog();
            const entry = {
                date:         params.date || todayISO(),
                session_type: params.session_type || 'General',
                duration:     params.duration || '?',
                mood:         params.mood || '3',
                exercises:    params.exercises || '',
                running:      params.running || ''
            };

            const idx = entries.findIndex(e => e.date === entry.date);
            if (idx >= 0) {
                entries[idx] = entry;
            } else {
                entries.unshift(entry);
            }

            // Keep 60 days max
            const trimmed = entries.slice(0, 60);
            saveLog(trimmed);

            // Calculate streak
            let streak = 1;
            for (let i = 1; i < trimmed.length; i++) {
                const prev = new Date(trimmed[i - 1].date);
                const curr = new Date(trimmed[i].date);
                const diffDays = Math.round((prev - curr) / 86400000);
                if (diffDays === 1) {
                    streak++;
                } else {
                    break;
                }
            }

            return `Workout logged for ${entry.date}. ` +
                   `Session: ${entry.session_type}, ${entry.duration} min, mood ${entry.mood}/5. ` +
                   `Current streak: ${streak} day(s). Total sessions logged: ${trimmed.length}.`;
        }

        function getHistory(params) {
            const days = parseInt(params.days) || 7;
            const entries = loadLog();

            if (entries.length === 0) {
                return 'No workouts logged yet. Log your first session to get a personalised plan!';
            }

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const recent = entries.filter(e => new Date(e.date) >= cutoff);

            if (recent.length === 0) {
                return `No workouts in the last ${days} days. Time to get back on track!`;
            }

            // Analyse what was trained
            const now = new Date();
            const recentMuscles = [];
            let runDays = 0;
            let coreDays = 0;

            recent.forEach(e => {
                const t = (e.session_type || '').toLowerCase();
                const ex = (e.exercises || '').toLowerCase();

                if (t.includes('run') || e.running) runDays++;
                if (t.includes('core') || ex.includes('plank') || ex.includes('crunch') || ex.includes('abs')) coreDays++;

                const diffH = (now - new Date(e.date)) / 3600000;
                if (diffH <= 48) {
                    if (t.includes('upper')) recentMuscles.push('upper body');
                    if (t.includes('lower')) recentMuscles.push('lower body');
                    if (t.includes('full')) { recentMuscles.push('upper body'); recentMuscles.push('lower body'); }
                }
            });

            const summary = recent.map(e =>
                `${e.date}: ${e.session_type} (${e.duration} min, mood ${e.mood}/5)`
            ).join(', ');

            const muscles = recentMuscles.length > 0
                ? `Recently trained (last 48h): ${[...new Set(recentMuscles)].join(', ')}.`
                : 'No muscle groups trained in the last 48 hours.';

            const flags = [];
            if (runDays < 2) flags.push('needs a running session');
            if (coreDays < 3) flags.push('needs more core work');

            return `Last ${recent.length} session(s) in ${days} days: ${summary}. ` +
                   `${muscles} ` +
                   `Running days this period: ${runDays}. Core days: ${coreDays}. ` +
                   (flags.length > 0 ? `Coach note: plan ${flags.join(' and ')}.` : 'Good balance this week!');
        }
    </script>
</body>
</html>
